<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made For KruSom - Purple Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Dancing+Script:wght@700&family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Itim', cursive; color: white;
        }

        #lockBox {
            position: fixed; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; background: #000;
        }
        input {
            padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #b388ff;
            text-align: center; width: 220px; background: #111; color: white; margin: 10px;
            outline: none; box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }
        .btn-open {
            padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px;
            background: #b388ff; color: white; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(179, 136, 255, 0.5);
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: 1; display: none; }

        #countdown {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; font-weight: 700; color: #b388ff;
            text-shadow: 0 0 30px rgba(179, 136, 255, 0.9); z-index: 10; display: none;
            font-family: 'Montserrat', sans-serif;
        }

        #mainContent {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center; z-index: 20;
            overflow-y: auto; pointer-events: none;
        }
        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 2px solid rgba(179, 136, 255, 0.4); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 380px;
            pointer-events: auto; margin: 20px;
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.2);
        }
        .profile { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #b388ff; object-fit: cover; }
        
        .gallery { display: flex; overflow-x: auto; gap: 10px; padding: 10px; margin-top: 15px; }
        .gallery img { height: 120px; width: 100px; object-fit: cover; border-radius: 10px; border: 2px solid #b388ff; }

        #letter, #giftText {
            display: none; background: rgba(0,0,0,0.5); padding: 15px;
            border-radius: 15px; margin-top: 15px; font-size: 16px; 
            border: 1px dashed #b388ff; color: #e1bee7;
        }
        
        .btn-action { padding: 10px 20px; margin: 5px; border: none; border-radius: 20px; background: #b388ff; color: white; cursor: pointer; font-family: 'Itim'; }

        .heart { position: fixed; bottom: -20px; color: #d1c4e9; animation: floatUp 4s linear forwards; z-index: 15; }
        @keyframes floatUp { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lockBox">
        <h2 style="color: #b388ff;">🔐 ใส่รหัสลับเพื่อเปิด</h2>
        <input id="passwordInput" type="number" placeholder="ใส่รหัสที่นี่">
        <button class="btn-open" onclick="checkPassword()">เปิดกล่องเซอร์ไพรส์</button>
        <p style="font-size: 14px; color: #7e57c2; margin-top: 10px;">คำใบ้: วันเกิด + เดือนเกิด + อายุ</p>
    </div>

    <canvas id="canvas"></canvas>
    <div id="countdown">3</div>

    <div id="mainContent">
        <div class="card">
            <h1 id="typewriter" style="color: #b388ff; font-family: 'Dancing Script'; font-size: 35px;"></h1>
            <img src="https://www.gifcen.com/wp-content/uploads/2024/12/happy-birthday-gif-5.gif" class="profile">
            
            <div style="margin-top: 15px;">
                <button class="btn-action" onclick="showGift()">เปิดของขวัญ 🎁</button>
                <button class="btn-action" onclick="showLetter()">เปิดจดหมาย 💌</button>
            </div>

            <div id="giftText"> สุขสันต์วันเกิดนะคะครูส้ม 🎂 <br> หนูขอให้ครูส้มมีความสุขกับทุกๆปี สุขภาพร่างกายแข็งแรง และหนูขอให้มีแต่เรื่องราวดีๆเข้ามาในชีวิตครูส้มนะคะ 💜 </div>
            <div id="letter"> แอ๊นท์ตี้รักครูส้มนะคะะ ❤️<br> </div>

            <h3 style="margin-top: 20px; font-size: 16px; color: #b388ff;">✨ For you Kru Som</h3>
            <div class="gallery">
                <img src="https://i.snapcdn.app/photo?token=..." alt="Memory 1">
                <img src="https://i.snapcdn.app/photo?token=..." alt="Memory 2">
                <img src="https://i.snapcdn.app/photo?token=..." alt="Memory 3">
            </div>
        </div>
    </div>

    <audio id="hbdMusic" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const correctPassword = "190335"; 
        const audio = document.getElementById('hbdMusic');

        function checkPassword() {
            let input = document.getElementById("passwordInput").value;
            if (input === correctPassword) {
                // ปลดล็อกเสียงบนมือถือ
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => console.log("Audio unlock"));

                document.getElementById("lockBox").style.display = "none";
                startSequence();
            } else {
                alert("รหัสไม่ถูกนะจ๊ะ ลองใหม่ค่ะๆ 💜");
            }
        }

        function startSequence() {
            document.getElementById("canvas").style.display = "block";
            document.getElementById("countdown").style.display = "block";
            startMatrix();
            
            let count = 3;
            let timer = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById("countdown").innerText = count;
                } else {
                    clearInterval(timer);
                    document.getElementById("countdown").style.display = "none";
                    showMainPage();
                }
            }, 2000); 
        }

        function showMainPage() {
            document.getElementById("mainContent").style.display = "flex";
            audio.play().catch(e => console.log("Playback failed"));
            typeWriter();
            setInterval(spawnHeart, 400);
            fireConfetti();
        }

        // ... (ฟังก์ชันอื่นๆ เหมือนเดิม) ...
        function startMatrix() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const alphabet = "KRUSOMHBDHAPPYLOVEYOU💜✨";
            const fontSize = 17;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#b388ff"; 
                ctx.font = fontSize + "px monospace";
                drops.forEach((y, i) => {
                    const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 35);
        }

        let messageText = "Happy Birthday, Krusom! 💜";
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < messageText.length) {
                document.getElementById("typewriter").innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 150);
            }
        }

        function showGift() { audio.play(); document.getElementById("giftText").style.display = "block"; fireConfetti(); }
        function showLetter() { audio.play(); document.getElementById("letter").style.display = "block"; }

        function spawnHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = "💜";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function fireConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#b388ff', '#d1c4e9', '#ffffff'] });
        }
    </script>
</body>
</html>
